services:
  - type: web
    name: print-your-fit-backend
    env: python
    pythonVersion: "3.11.9"
    region: oregon
    plan: free
    branch: main
    buildCommand: |
      export CARGO_HOME=/tmp/cargo
      export PIP_CACHE_DIR=/tmp/pip-cache
      python --version
      pip install --no-cache-dir -r requirements.txt
      # Run Django migrations and collectstatic during build
      cd pyf-backend
      python manage.py migrate --noinput || true
      python manage.py collectstatic --noinput || true
    startCommand: gunicorn django_project.wsgi:application --bind 0.0.0.0:$PORT --workers 3
    workingDirectory: pyf-backend
    envVars:
      - key: DATABASE_URL
        fromSecret: DATABASE_URL
      - key: DJANGO_SETTINGS_MODULE
        value: django_project.settings
      - key: SECRET_KEY
        fromSecret: SECRET_KEY
      - key: CLOUDINARY_CLOUD_NAME
        fromSecret: CLOUDINARY_CLOUD_NAME
      - key: CLOUDINARY_API_KEY
        fromSecret: CLOUDINARY_API_KEY
      - key: CLOUDINARY_API_SECRET
        fromSecret: CLOUDINARY_API_SECRET
      - key: PAYSTACK_SECRET_KEY
        fromSecret: PAYSTACK_SECRET_KEY
      - key: PAYSTACK_BASE_URL
        fromSecret: PAYSTACK_BASE_URL
      - key: VTPASS_API_KEY
        fromSecret: VTPASS_API_KEY
      - key: VTPASS_URL
        fromSecret: VTPASS_URL
      - key: DEBUG
        value: "false"
      - key: FRONTEND_URL
        value: "https://print-your-fit.vercel.app"
      - key: DEFAULT_PRINT_SHOP_ID
        fromSecret: DEFAULT_PRINT_SHOP_ID
